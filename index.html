<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Airvoice Apps</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      padding: 40px 36px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }

    .logo {
      width: 64px;
      height: 64px;
      background: #1d4ed8;
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .logo svg { width: 36px; height: 36px; fill: #ffffff; }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: #64748b;
      margin-bottom: 32px;
    }

    .app-btn {
      display: flex;
      align-items: center;
      gap: 14px;
      background: #f8fafc;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 16px 20px;
      text-decoration: none;
      color: #0f172a;
      margin-bottom: 12px;
      transition: all 0.15s ease;
      text-align: left;
    }

    .app-btn:hover {
      background: #eff6ff;
      border-color: #3b82f6;
    }

    .app-icon {
      width: 40px;
      height: 40px;
      background: #dbeafe;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }

    .app-label { font-weight: 600; font-size: 15px; }
    .app-desc  { font-size: 12px; color: #64748b; margin-top: 2px; }

    .arrow {
      margin-left: auto;
      color: #94a3b8;
      font-size: 18px;
    }

    .status {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 24px;
    }

    .loading { color: #94a3b8; font-size: 14px; padding: 16px; }
    .error   { color: #ef4444; font-size: 14px; padding: 16px; }

    .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: #22c55e;
      border-radius: 50%;
      margin-right: 5px;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <!-- Simple air quality icon -->
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5S10.62 6.5 12 6.5s2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
      </svg>
    </div>

    <h1>Airvoice</h1>
    <p class="subtitle">Internal apps portal</p>

    <div id="apps">
      <p class="loading">Loading app links...</p>
    </div>

    <p class="status" id="status"></p>
  </div>

  <script>
    // Add a cache-busting query param so GitHub Pages always serves the latest config
    fetch('./config.json?t=' + Date.now())
      .then(r => {
        if (!r.ok) throw new Error('config.json not found');
        return r.json();
      })
      .then(cfg => {
        const appsDiv = document.getElementById('apps');

        // Build the app buttons from config
        const apps = [
          {
            url: cfg.inventoryUrl,
            icon: '📦',
            label: 'Inventory Manager',
            desc: 'Stock · Dispatch · Servicing · Customers',
          },
          // Add more apps here in the future:
          // { url: cfg.app2Url, icon: '📊', label: 'Reports', desc: 'Analytics and reports' },
        ];

        appsDiv.innerHTML = apps.map(app => `
          <a href="${app.url}" class="app-btn" target="_self">
            <div class="app-icon">${app.icon}</div>
            <div>
              <div class="app-label">${app.label}</div>
              <div class="app-desc">${app.desc}</div>
            </div>
            <span class="arrow">›</span>
          </a>
        `).join('');

        // Show last updated time
        if (cfg.updatedAt) {
          const d = new Date(cfg.updatedAt);
          document.getElementById('status').innerHTML =
            '<span class="dot"></span>Live &nbsp;·&nbsp; Updated ' + d.toLocaleString();
        }
      })
      .catch(() => {
        document.getElementById('apps').innerHTML =
          '<p class="error">Could not load app links. The server may be restarting — please refresh in a moment.</p>';
      });
  </script>
</body>
</html>
